name: Build Universal APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Universal Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -storepass password -keypass password -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=MusicYou,O=MusicYou,C=US"
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          for apk in app/build/outputs/apk/release/*.apk; do
            $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-pass pass:password --key-pass pass:password "$apk"
          done

      - name: Upload Universal APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicYou-Universal-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
